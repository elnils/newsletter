<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tageslage – Presseschau-Archiv</title>
<style>
  :root {
    --navy: #1b2a3b; --navy2: #2c3e50; --blue: #5a7fa0;
    --light: #a0b4c4; --muted: #7a9bb5; --bg: #eef1f4;
    --border: #e2e6ea; --text: #1c1c1e; --text2: #3a3a3c;
    --linkbox: #d4e3ed; --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 14px; line-height: 1.5;
  }
  a { color: inherit; text-decoration: none; }

  .topbar { background: var(--navy); color: #fff; padding: 14px 20px; position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 6px rgba(0,0,0,.15); }
  .topbar-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .brand { font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
  .brand .dot { color: var(--blue); }
  .topbar .meta { font-size: 11px; color: var(--light); margin-left: auto; }

  .issuebar { background: var(--navy2); padding: 8px 20px; position: sticky; top: 49px; z-index: 49; }
  .issuebar-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 8px; overflow-x: auto; }
  .issuebar select { background: #fff; border: none; border-radius: 4px; padding: 6px 10px; font-size: 13px; font-family: inherit; color: var(--navy); font-weight: 600; cursor: pointer; min-width: 230px; }
  .issuebar .nav-btn { background: rgba(255,255,255,.12); color: #fff; border: none; border-radius: 4px; padding: 6px 11px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .issuebar .nav-btn:hover { background: rgba(255,255,255,.22); }
  .issuebar .nav-btn:disabled { opacity: .35; cursor: default; }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 18px 16px 60px; }

  .lead { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; margin-bottom: 16px; }
  .lead .date { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--blue); margin-bottom: 8px; }
  .lead .intro { font-size: 15px; line-height: 1.7; color: var(--text2); }
  .specials { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .special { flex: 1 1 240px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px 15px; font-size: 13px; line-height: 1.55; color: var(--text2); }
  .special .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--blue); margin-bottom: 5px; }
  .special a { color: var(--text2); border-bottom: 1px solid var(--light); }
  .special .src { color: var(--muted); font-size: 10px; }

  .filters { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
  .chip { background: var(--card); border: 1px solid #cdd6df; color: var(--navy); border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .12s; white-space: nowrap; }
  .chip:hover { border-color: var(--blue); }
  .chip.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .chip .cnt { opacity: .6; font-weight: 400; margin-left: 4px; }

  .section { margin-bottom: 26px; }
  .section h2 { font-size: 16px; font-weight: 700; color: var(--navy); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .section .summary { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; padding-left: 2px; }
  .section .summary .s-row { display: flex; gap: 7px; padding: 2px 0; }
  .section .summary .s-dash { color: var(--blue); font-weight: 700; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
  .ncard { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 13px 15px; cursor: pointer; transition: all .14s; display: flex; flex-direction: column; gap: 7px; }
  .ncard:hover { border-color: var(--blue); box-shadow: 0 3px 10px rgba(0,0,0,.07); transform: translateY(-1px); }
  .ncard .src { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--blue); }
  .ncard .ttl { font-size: 13.5px; font-weight: 600; color: var(--navy); line-height: 1.4; }
  .ncard .prev { font-size: 12px; color: var(--muted); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  /* ── Quellen-Filter (Feature C) ── */
  .srcfilter { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; }
  .sf-chip { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 14px; border: 1px solid #cdd6df; color: var(--muted); background: var(--card); cursor: pointer; transition: all .12s; }
  .sf-chip:hover { border-color: var(--blue); color: var(--navy); }
  .sf-chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* ── Mehr zum Thema (Feature A) ── */
  details.morebox { margin-top: 10px; }
  details.morebox summary { cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--blue); padding: 8px 2px; user-select: none; list-style: none; }
  details.morebox summary:hover { color: var(--navy); }
  details.morebox summary::-webkit-details-marker { display: none; }
  .morebox-grid { margin-top: 8px; }

  details.allbox { background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-top: 8px; }
  details.allbox summary { cursor: pointer; padding: 13px 18px; font-size: 13px; font-weight: 600; color: var(--muted); user-select: none; }
  details.allbox summary:hover { color: var(--navy); }
  .allcat { padding: 6px 18px 14px; }
  .allcat h4 { font-size: 12px; color: var(--navy); margin: 10px 0 6px; }
  .allrow { display: flex; gap: 10px; align-items: baseline; padding: 5px 0; border-bottom: 1px solid #f0f2f4; cursor: pointer; }
  .allrow:hover .arl { color: var(--blue); }
  .allrow .ars { flex: 0 0 100px; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .allrow .arl { flex: 1; font-size: 13px; color: var(--text); line-height: 1.4; }

  .wm { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; margin-top: 16px; }
  .wm h3 { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .wm table { width: 100%; border-collapse: collapse; }
  .wm .sub { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 6px 0 2px; }
  .wm .zeit { font-size: 13px; color: var(--muted); white-space: nowrap; width: 54px; vertical-align: top; }
  .wm .paar { font-size: 13px; color: var(--text2); }
  .wm .paar.small { color: var(--muted); }
  .wm .zuletzt { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
  .wm .link { margin-top: 8px; }
  .wm .link a { font-size: 11px; font-weight: 600; color: var(--blue); }

  .archive { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; margin-top: 22px; }
  .archive h3 { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 12px; }
  .search { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid #c5d2dd; border-radius: 6px; margin-bottom: 12px; font-family: inherit; }
  .search:focus { outline: none; border-color: var(--blue); }
  .arch-list { list-style: none; }
  .arch-item { border-bottom: 1px solid var(--border); }
  .arch-item:last-child { border-bottom: none; }
  .arch-item button { width: 100%; text-align: left; background: none; border: none; padding: 11px 4px; cursor: pointer; font-family: inherit; display: flex; gap: 12px; align-items: baseline; }
  .arch-item button:hover { background: #f6f8fa; }
  .arch-item .d { flex: 0 0 95px; font-size: 13px; font-weight: 700; color: var(--navy); white-space: nowrap; }
  .arch-item .z { flex: 0 0 52px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--blue); }
  .arch-item .t { flex: 1; font-size: 13px; color: var(--text2); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .empty { padding: 16px 4px; font-size: 13px; color: var(--muted); }

  .footer { text-align: center; font-size: 11px; color: var(--muted); line-height: 1.8; padding: 24px; }
  .loading { text-align: center; padding: 50px; color: var(--muted); }

  /* ── Karte im offenen Zustand ── */
  .ncard.open { border-color: var(--blue); box-shadow: 0 3px 12px rgba(0,0,0,.08); }
  .ncard.open .ttl { color: var(--blue); }

  /* ── Inline-Vorschau (sanft unter der Karte) ── */
  .inline-prev {
    grid-column: 1 / -1;          /* volle Breite im Raster */
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height .3s ease, opacity .25s ease, margin .3s ease;
    margin: 0;
  }
  .inline-prev.open {
    max-height: 600px;
    opacity: 1;
    margin: 2px 0 8px;
  }
  .inline-prev-inner {
    background: #f8fafc;
    border: 1px solid var(--border);
    border-left: 3px solid var(--blue);
    border-radius: 6px;
    padding: 16px 18px;
  }
  .inline-prev .ip-meta { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--blue); margin-bottom: 8px; }
  .inline-prev .ip-text { font-size: 13.5px; line-height: 1.7; color: var(--text2); margin-bottom: 14px; }
  .inline-prev .ip-text.empty { font-style: italic; color: var(--muted); }
  .inline-prev .ip-link { display: inline-block; background: var(--blue); color: #fff; font-size: 13px; font-weight: 600; padding: 9px 16px; border-radius: 5px; }
  .inline-prev .ip-link:hover { background: var(--navy2); }

  /* ── Inline-Vorschau in der "Alle Artikel"-Liste ── */
  .allrow-prev { overflow: hidden; max-height: 0; opacity: 0; transition: max-height .3s ease, opacity .25s ease; }
  .allrow-prev.open { max-height: 400px; opacity: 1; }
  .allrow-prev-inner { background: #f8fafc; border-left: 3px solid var(--blue); border-radius: 4px; padding: 12px 14px; margin: 4px 0 8px; }
  .allrow-prev .ip-text { font-size: 13px; line-height: 1.6; color: var(--text2); margin-bottom: 10px; }
  .allrow-prev .ip-text.empty { font-style: italic; color: var(--muted); }
  .allrow-prev .ip-link { display: inline-block; background: var(--blue); color: #fff; font-size: 12px; font-weight: 600; padding: 7px 13px; border-radius: 4px; }
  .allrow.open .arl { color: var(--blue); font-weight: 600; }

  /* ── Tablet ── */
  @media (max-width: 760px) {
    .wrap { padding: 14px 12px 50px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
  }

  /* ── Mobil (iPhone / Android) ── */
  @media (max-width: 600px) {
    body { font-size: 15px; }            /* etwas größer für Lesbarkeit */
    .topbar { padding: 12px 16px; padding-top: max(12px, env(safe-area-inset-top)); }
    .topbar-inner { gap: 8px; }
    .brand { font-size: 18px; }
    .topbar .meta { font-size: 10px; width: 100%; margin-left: 0; order: 3; }
    .issuebar { top: auto; position: static; padding: 8px 12px; }   /* nicht sticky → mehr Platz */
    .issuebar-inner { gap: 6px; }
    .issuebar select { min-width: 0; flex: 1; font-size: 14px; padding: 9px 10px; }
    .issuebar .nav-btn { padding: 9px 13px; font-size: 15px; }       /* größere Tap-Targets */

    .wrap { padding: 12px 10px 50px; }
    .lead { padding: 15px 16px; border-radius: 10px; }
    .lead .intro { font-size: 15px; }
    .specials { flex-direction: column; gap: 8px; }
    .special { flex: 1 1 auto; }

    /* Themen-Chips: horizontal scrollbar statt Umbruch-Chaos */
    .filters { flex-wrap: nowrap; overflow-x: auto; gap: 6px; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .filters::-webkit-scrollbar { display: none; }
    .chip { flex: 0 0 auto; padding: 9px 15px; font-size: 14px; }   /* Touch-freundlich */

    .section h2 { font-size: 17px; }
    .grid { grid-template-columns: 1fr; gap: 9px; }
    .ncard { padding: 14px 16px; }
    .ncard:hover { transform: none; }                                /* kein Hover-Wackeln auf Touch */
    .ncard .ttl { font-size: 15px; }
    .ncard .prev { font-size: 13px; }

    .inline-prev-inner { padding: 15px 16px; }
    .inline-prev .ip-text { font-size: 15px; }
    .inline-prev .ip-link, .allrow-prev .ip-link { padding: 11px 18px; font-size: 14px; }  /* großer Tap-Button */

    .allrow { padding: 9px 0; }                                      /* mehr Platz zum Tippen */
    .allrow .ars { flex-basis: 78px; }
    .allcat { padding: 6px 14px 14px; }

    .archive { padding: 16px 16px; }
    .arch-item button { padding: 13px 4px; }                         /* Touch-freundlich */
    .arch-item .d { flex-basis: 84px; }

    .wrap, .footer { padding-bottom: max(50px, env(safe-area-inset-bottom)); }  /* iPhone-Home-Indicator */
  }

  /* ── Sehr schmal (kleine Androids) ── */
  @media (max-width: 360px) {
    .brand { font-size: 16px; }
    .ncard .ttl { font-size: 14px; }
    .arch-item .z { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <span class="brand">Tageslage<span class="dot">.</span></span>
    <span class="meta" id="metabar">Lade …</span>
  </div>
</div>

<div class="issuebar">
  <div class="issuebar-inner">
    <button class="nav-btn" id="prevIssue" title="Neuere Ausgabe">←</button>
    <select id="issueSelect"></select>
    <button class="nav-btn" id="nextIssue" title="Ältere Ausgabe">→</button>
  </div>
</div>

<div class="wrap">
  <div id="issueArea"><div class="loading">Ausgabe wird geladen …</div></div>

  <div class="archive">
    <h3>📚 Alle Ausgaben durchsuchen</h3>
    <input type="search" class="search" id="searchBox"
           placeholder="Suchen (z.B. EZB, Zölle, 10.06.2026) …" autocomplete="off">
    <ul class="arch-list" id="archList"><li class="empty">Lade …</li></ul>
  </div>
</div>

<div class="footer">
  Tageslage – automatisch erstellte Presseschau · KI-kuratiert<br>
  Historische Fakten: Wikipedia (CC BY-SA) · Zahlen: Destatis & Our World in Data (CC BY) · Powered by Nils
</div>

<script>
(function () {
  'use strict';
  var INDEX = [];
  var current = null;
  var currentFile = null;
  var activeFilter = 'alle';

  var elIssue  = document.getElementById('issueArea');
  var elList   = document.getElementById('archList');
  var elSearch = document.getElementById('searchBox');
  var elMeta   = document.getElementById('metabar');
  var elSelect = document.getElementById('issueSelect');

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  // Entfernt rohes HTML aus alten Daten (Schutz: <a href>, <p> etc.), das
  // sonst als Code erscheint. Neue Daten sind schon serverseitig bereinigt.
  function clean(s) {
    return String(s == null ? '' : s).replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
  }
  function deDate(iso) {
    var p = String(iso).split('-');
    return p.length === 3 ? p[2] + '.' + p[1] + '.' + p[0] : iso;
  }
  function zeitLabel(z) { return z === 'morgen' ? 'Morgen' : 'Abend'; }

  // Wandelt ‹‹SRC|Quelle|URL›› in einen dezenten, unterstrichenen Quellen-Link.
  // Escaped zuerst den Text, dann werden die (sicheren) Marker zu Links.
  function renderSrc(s) {
    var txt = clean(String(s == null ? '' : s).replace(/^•\s*/, ''));
    var escaped = txt.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    // Marker liegen jetzt escaped als ‹‹SRC|...|...›› vor (Zeichen ‹› bleiben)
    return escaped.replace(/‹‹SRC\|([^|]*)\|([^›]*)››/g, function (m, quelle, url) {
      quelle = quelle.trim();
      if (!quelle) return '';
      var label = '[' + quelle + ']';
      if (!url) return '<span style="color:var(--muted);font-size:.85em;">&nbsp;' + label + '</span>';
      return '&nbsp;<a href="' + url + '" target="_blank" rel="noopener" ' +
             'style="color:var(--muted);text-decoration:underline;text-decoration-color:var(--light);font-size:.85em;">' +
             label + '</a>';
    });
  }

  /* ─────────── Inline-Vorschau ─────────── */
  function previewInner(a) {
    var v = clean(a.vorschau || '');
    var textHtml = v
      ? '<div class="ip-text">' + esc(v) + '</div>'
      : '<div class="ip-text empty">Für diesen Artikel liegt keine Vorschau vor. Über den Button gelangst du zum vollständigen Beitrag.</div>';
    var meta = a.quelle ? '<div class="ip-meta">' + esc(a.quelle) + '</div>' : '';
    var btn = '<a class="ip-link" href="' + esc(a.url || '#') + '" target="_blank" rel="noopener">' +
              (a.quelle ? 'Auf ' + esc(a.quelle) + ' lesen →' : 'Artikel öffnen →') + '</a>';
    return meta + textHtml + btn;
  }


  function renderIssue(d) {
    current = d;
    activeFilter = 'alle';
    var h = '';

    h += '<div class="lead">';
    h += '<div class="date">' + esc(deDate(d.datum)) + ' · ' + esc(zeitLabel(d.zeit)) + '-Ausgabe</div>';
    if (d.intro) h += '<div class="intro">' + renderSrc(d.intro) + '</div>';
    h += '</div>';

    var sp = '';
    if (d.wikipedia && d.wikipedia.text) {
      var w = d.wikipedia;
      sp += '<div class="special"><div class="lbl">📅 An diesem Tag</div>' +
            (w.url ? '<a href="' + esc(w.url) + '" target="_blank" rel="noopener">' + esc(w.text) + '</a>' : esc(w.text)) +
            ' <span class="src">· Wikipedia</span></div>';
    }
    if (d.destatis && d.destatis.text) {
      var ds = d.destatis;
      sp += '<div class="special"><div class="lbl">📊 Zahl des Tages</div>' +
            (ds.url ? '<a href="' + esc(ds.url) + '" target="_blank" rel="noopener">' + esc(clean(ds.text)) + '</a>' : esc(clean(ds.text))) +
            ' <span class="src">· ' + esc(ds.quelle || 'Destatis') + '</span></div>';
    }
    if (sp) h += '<div class="specials">' + sp + '</div>';

    var cats = (d.kategorien || []).filter(function (k) { return k.links && k.links.length; });
    if (cats.length) {
      h += '<div class="filters" id="filters">';
      var totalArt = cats.reduce(function (s, k) { return s + k.links.length; }, 0);
      h += '<span class="chip active" data-f="alle">Alle <span class="cnt">' + totalArt + '</span></span>';
      cats.forEach(function (k) {
        h += '<span class="chip" data-f="' + esc(k.name) + '">' + esc(k.name) +
             ' <span class="cnt">' + k.links.length + '</span></span>';
      });
      h += '</div>';
    }

    h += '<div id="sections">';
    cats.forEach(function (k) { h += renderSection(k); });
    h += '</div>';

    var alleKeys = d.alle_artikel ? Object.keys(d.alle_artikel) : [];
    if (alleKeys.length) {
      var total = alleKeys.reduce(function (s, k) { return s + d.alle_artikel[k].length; }, 0);
      h += '<details class="allbox"><summary>Alle ' + total + ' gesammelten Artikel dieser Ausgabe ▾</summary>';
      alleKeys.forEach(function (k) {
        h += '<div class="allcat"><h4>' + esc(k) + '</h4>';
        d.alle_artikel[k].forEach(function (a, i) {
          h += '<div class="allrow" data-cat="' + esc(k) + '" data-i="' + i + '">' +
               '<span class="ars">' + esc(a.quelle) + '</span>' +
               '<span class="arl">' + esc(clean(a.titel)) + '</span></div>' +
               '<div class="allrow-prev" data-for="all-' + esc(k) + '-' + i + '"></div>';
        });
        h += '</div>';
      });
      h += '</details>';
    }

    h += renderWM(d.wm);

    elIssue.innerHTML = h;
    bindIssueEvents();
    document.title = 'Tageslage – ' + deDate(d.datum);
  }

  function renderSection(k) {
    var h = '<div class="section" data-cat="' + esc(k.name) + '"><h2>' + esc(k.name) + '</h2>';
    if (k.punkte && k.punkte.length) {
      h += '<div class="summary">';
      k.punkte.forEach(function (p) {
        h += '<div class="s-row"><span class="s-dash">–</span><span>' +
             renderSrc(p) + '</span></div>';
      });
      h += '</div>';
    }

    // Feature C: Quellen-Filter (nur wenn mehrere Quellen vorhanden)
    var allArts = (k.links || []).concat(k.weitere || []);
    var quellen = [];
    allArts.forEach(function (a) { if (a.quelle && quellen.indexOf(a.quelle) === -1) quellen.push(a.quelle); });
    if (quellen.length > 1) {
      h += '<div class="srcfilter" data-cat="' + esc(k.name) + '">';
      h += '<span class="sf-chip active" data-src="alle">Alle Quellen</span>';
      quellen.forEach(function (q) {
        h += '<span class="sf-chip" data-src="' + esc(q) + '">' + esc(q) + '</span>';
      });
      h += '</div>';
    }

    // Kuratierte Karten
    h += '<div class="grid">';
    k.links.forEach(function (l, i) {
      var prev = clean(l.vorschau || '');
      h += '<div class="ncard" data-cat="' + esc(k.name) + '" data-i="' + i + '" data-src="' + esc(l.quelle) + '">' +
           '<span class="src">' + esc(l.quelle) + '</span>' +
           '<span class="ttl">' + esc(clean(l.titel)) + '</span>' +
           (prev ? '<span class="prev">' + esc(prev) + '</span>' : '') +
           '</div>' +
           '<div class="inline-prev"></div>';
    });
    h += '</div>';

    // Feature A: "Mehr zum Thema" – weitere (nicht kuratierte) Artikel
    if (k.weitere && k.weitere.length) {
      h += '<details class="morebox"><summary>+ ' + k.weitere.length +
           ' weitere Artikel zu ' + esc(k.name.replace(/^[^\s]+\s/, '')) + ' ▾</summary>';
      h += '<div class="grid morebox-grid">';
      k.weitere.forEach(function (l, i) {
        var prev = clean(l.vorschau || '');
        h += '<div class="ncard" data-cat="' + esc(k.name) + '" data-w="' + i + '" data-src="' + esc(l.quelle) + '">' +
             '<span class="src">' + esc(l.quelle) + '</span>' +
             '<span class="ttl">' + esc(clean(l.titel)) + '</span>' +
             (prev ? '<span class="prev">' + esc(prev) + '</span>' : '') +
             '</div>' +
             '<div class="inline-prev"></div>';
      });
      h += '</div></details>';
    }

    h += '</div>';
    return h;
  }

  function renderWM(wm) {
    if (!wm) return '';
    var has = wm.letztes || (wm.heute && wm.heute.length) || (wm.naechste && wm.naechste.length) ||
              (wm.gestern && wm.gestern.length) || (wm.heute_fertig && wm.heute_fertig.length) ||
              (wm.ausstehend && wm.ausstehend.length);
    if (!has) return '';
    function row(zeit, paar, small) {
      return '<tr><td class="zeit">' + esc(zeit || '') + '</td>' +
             '<td class="paar' + (small ? ' small' : '') + '">' + esc(paar || '') + '</td></tr>';
    }
    var h = '<div class="wm"><h3>⚽ Fußball-WM 2026</h3>';
    var hf = wm.heute_fertig || [];
    var letztesInHf = hf.some(function (s) { return wm.letztes && s.paarung && s.paarung.indexOf(wm.letztes) !== -1; });
    if (wm.letztes && !letztesInHf) {
      h += '<div class="zuletzt"><span style="color:var(--muted);">Zuletzt:</span> <strong style="color:var(--navy);">' + esc(wm.letztes) + '</strong></div>';
    }
    h += '<table>';
    if (hf.length) { h += '<tr><td colspan="2" class="sub">Heute bereits gespielt</td></tr>'; hf.forEach(function (s) { h += row(s.zeit, s.paarung, false); }); }
    if (wm.ausstehend && wm.ausstehend.length) { h += '<tr><td colspan="2" class="sub">Ergebnis folgt</td></tr>'; wm.ausstehend.forEach(function (s) { h += row(s.zeit, s.paarung, true); }); }
    var gestern = (wm.gestern || []).filter(function (g) { return g !== wm.letztes; });
    if (gestern.length) { h += '<tr><td colspan="2" class="sub">Ergebnisse gestern</td></tr>'; gestern.forEach(function (g) { h += row('', g, true); }); }
    if (wm.heute && wm.heute.length) { h += '<tr><td colspan="2" class="sub">Heute</td></tr>'; wm.heute.forEach(function (s) { h += row(s.zeit, s.paarung, false); }); }
    else if (wm.naechste && wm.naechste.length) { h += '<tr><td colspan="2" class="sub">Als Nächstes</td></tr>'; wm.naechste.forEach(function (s) { h += row(s.zeit, s.paarung, false); }); }
    h += '</table>';
    if (wm.link) h += '<div class="link"><a href="' + esc(wm.link) + '" target="_blank" rel="noopener">Alle Ergebnisse & Spielplan →</a></div>';
    h += '</div>';
    return h;
  }

  function bindIssueEvents() {
    var chips = elIssue.querySelectorAll('.chip');
    chips.forEach(function (c) {
      c.addEventListener('click', function () {
        chips.forEach(function (x) { x.classList.remove('active'); });
        c.classList.add('active');
        activeFilter = c.getAttribute('data-f');
        elIssue.querySelectorAll('.section').forEach(function (sec) {
          var show = (activeFilter === 'alle') || (sec.getAttribute('data-cat') === activeFilter);
          sec.style.display = show ? '' : 'none';
        });
      });
    });

    // Karten-Klick → Inline-Vorschau darunter aufklappen
    elIssue.querySelectorAll('.ncard').forEach(function (card) {
      card.addEventListener('click', function () {
        var cat = card.getAttribute('data-cat');
        var k = (current.kategorien || []).filter(function (x) { return x.name === cat; })[0];
        if (!k) return;
        // kuratiert (data-i) oder weitere (data-w)?
        var a;
        if (card.hasAttribute('data-w')) {
          a = (k.weitere || [])[parseInt(card.getAttribute('data-w'), 10)];
        } else {
          a = (k.links || [])[parseInt(card.getAttribute('data-i'), 10)];
        }
        if (!a) return;
        var prevEl = card.nextElementSibling;
        var isOpen = prevEl.classList.contains('open');

        var grid = card.parentNode;
        grid.querySelectorAll('.inline-prev.open').forEach(function (el) { el.classList.remove('open'); el.innerHTML = ''; });
        grid.querySelectorAll('.ncard.open').forEach(function (el) { el.classList.remove('open'); });

        if (!isOpen) {
          prevEl.innerHTML = '<div class="inline-prev-inner">' + previewInner(a) + '</div>';
          prevEl.classList.add('open');
          card.classList.add('open');
        }
      });
    });

    // Feature C: Quellen-Filter pro Sektion
    elIssue.querySelectorAll('.srcfilter').forEach(function (sf) {
      var section = sf.closest('.section');
      sf.querySelectorAll('.sf-chip').forEach(function (chip) {
        chip.addEventListener('click', function () {
          sf.querySelectorAll('.sf-chip').forEach(function (x) { x.classList.remove('active'); });
          chip.classList.add('active');
          var src = chip.getAttribute('data-src');
          section.querySelectorAll('.ncard').forEach(function (card) {
            var show = (src === 'alle') || (card.getAttribute('data-src') === src);
            card.style.display = show ? '' : 'none';
            // zugehörige offene Vorschau ggf. mit ausblenden
            var pv = card.nextElementSibling;
            if (pv && pv.classList.contains('inline-prev')) pv.style.display = show ? '' : 'none';
          });
        });
      });
    });

    // "Alle Artikel"-Zeile → Inline-Vorschau darunter
    elIssue.querySelectorAll('.allrow').forEach(function (row) {
      row.addEventListener('click', function () {
        var cat = row.getAttribute('data-cat');
        var i   = parseInt(row.getAttribute('data-i'), 10);
        var arr = current.alle_artikel[cat] || [];
        var a = arr[i];
        if (!a) return;
        var prevEl = row.nextElementSibling;
        var isOpen = prevEl.classList.contains('open');

        var container = row.parentNode;
        container.querySelectorAll('.allrow-prev.open').forEach(function (el) { el.classList.remove('open'); el.innerHTML = ''; });
        container.querySelectorAll('.allrow.open').forEach(function (el) { el.classList.remove('open'); });

        if (!isOpen) {
          prevEl.innerHTML = '<div class="allrow-prev-inner">' + previewInner(a) + '</div>';
          prevEl.classList.add('open');
          row.classList.add('open');
        }
      });
    });
  }

  function loadIssue(file, scroll) {
    elIssue.innerHTML = '<div class="loading">Ausgabe wird geladen …</div>';
    fetch('data/' + file).then(function (r) {
      if (!r.ok) throw new Error(r.status); return r.json();
    }).then(function (d) {
      currentFile = file;
      renderIssue(d);
      elSelect.value = file;
      updateNavButtons();
      if (scroll) window.scrollTo({ top: 0, behavior: 'smooth' });
      var base = file.replace(/\.json$/, '');
      try { history.replaceState(null, '', '?a=' + base); } catch (e) {}
    }).catch(function () {
      elIssue.innerHTML = '<div class="loading">Ausgabe konnte nicht geladen werden.</div>';
    });
  }

  function updateNavButtons() {
    var idx = INDEX.findIndex(function (e) { return e.datei === currentFile; });
    document.getElementById('prevIssue').disabled = (idx <= 0);
    document.getElementById('nextIssue').disabled = (idx < 0 || idx >= INDEX.length - 1);
  }
  document.getElementById('prevIssue').addEventListener('click', function () {
    var idx = INDEX.findIndex(function (e) { return e.datei === currentFile; });
    if (idx > 0) loadIssue(INDEX[idx - 1].datei, true);
  });
  document.getElementById('nextIssue').addEventListener('click', function () {
    var idx = INDEX.findIndex(function (e) { return e.datei === currentFile; });
    if (idx >= 0 && idx < INDEX.length - 1) loadIssue(INDEX[idx + 1].datei, true);
  });
  elSelect.addEventListener('change', function () { loadIssue(elSelect.value, true); });

  function renderList(items) {
    if (!items.length) { elList.innerHTML = '<li class="empty">Keine Ausgaben gefunden.</li>'; return; }
    var h = '';
    items.forEach(function (e) {
      h += '<li class="arch-item"><button data-file="' + esc(e.datei) + '">' +
           '<span class="d">' + esc(deDate(e.datum)) + '</span>' +
           '<span class="z">' + esc(zeitLabel(e.zeit)) + '</span>' +
           '<span class="t">' + esc(e.intro || '') + '</span></button></li>';
    });
    elList.innerHTML = h;
  }
  elList.addEventListener('click', function (ev) {
    var btn = ev.target.closest('button[data-file]');
    if (btn) loadIssue(btn.getAttribute('data-file'), true);
  });
  elSearch.addEventListener('input', function () {
    var q = elSearch.value.trim().toLowerCase();
    renderList(q ? INDEX.filter(function (e) { return (e.suchtext || '').indexOf(q) !== -1; }) : INDEX);
  });

  function fillSelect() {
    elSelect.innerHTML = INDEX.map(function (e) {
      return '<option value="' + esc(e.datei) + '">' + esc(deDate(e.datum)) + ' · ' + esc(zeitLabel(e.zeit)) + '</option>';
    }).join('');
  }

  fetch('data/index.json').then(function (r) {
    if (!r.ok) throw new Error(r.status); return r.json();
  }).then(function (idx) {
    INDEX = idx || [];
    elMeta.textContent = INDEX.length + ' Ausgabe' + (INDEX.length === 1 ? '' : 'n') + ' · KI-kuratiert';
    fillSelect();
    renderList(INDEX);
    var params = new URLSearchParams(location.search);
    var wanted = params.get('a');
    var match = wanted && INDEX.filter(function (e) { return e.datei === wanted + '.json'; })[0];
    if (match) loadIssue(match.datei, false);
    else if (INDEX.length) loadIssue(INDEX[0].datei, false);
    else elIssue.innerHTML = '<div class="loading">Noch keine Ausgaben vorhanden.</div>';
  }).catch(function () {
    elMeta.textContent = 'Archiv noch nicht verfügbar';
    elList.innerHTML = '<li class="empty">Noch keine Daten vorhanden.</li>';
    elIssue.innerHTML = '<div class="loading">Noch keine Ausgaben vorhanden.</div>';
  });
})();
</script>
</body>
</html>
