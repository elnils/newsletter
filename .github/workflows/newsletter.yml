name: 🗞️ Tagesbrief Newsletter
on:
  schedule:
    - cron: '0 5 * * *'   # Morgens ~7:00 Uhr MEZ (Sommer)
    - cron: '0 17 * * *'  # Abends ~19:00 Uhr MEZ (Sommer)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Grund für manuellen Start'
        required: false
        default: 'Test'
jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Repository laden
        uses: actions/checkout@v4
      - name: 🐍 Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: 📦 Abhängigkeiten installieren
        run: pip install -r requirements.txt
      - name: 🗞️ Newsletter erstellen & senden
        env:
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:     ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/newsletter.py
      - name: ✅ Zusammenfassung
        if: success()
        run: echo "Newsletter erfolgreich verschickt! 🎉"
      - name: ❌ Fehler-Benachrichtigung
        if: failure()
        run: echo "Newsletter konnte nicht verschickt werden. Logs prüfen!"
