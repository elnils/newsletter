name: Tageslage Newsletter

# Geplanter Abruf erfolgt extern über cron-job.org (per workflow_dispatch).
on:
  workflow_dispatch:

permissions:
  contents: write   # noetig, damit der Commit von index.html/data/ gepusht werden darf

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:

      # 1) Repo auschecken
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Python bereitstellen
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3) Abhaengigkeiten
      - name: Abhaengigkeiten installieren
        run: pip install feedparser groq gspread google-auth

      # 4) Empfaengerliste aus Google Sheet -> schreibt RECIPIENT_LIST
      - name: Empfaengerliste laden
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: python3 scripts/recipients.py

      # 5) Newsletter bauen + versenden + Archiv-JSON nach data/ schreiben
      #    (laeuft in scripts/, daher landet data/ via ../data in der Repo-Wurzel)
      - name: Newsletter ausfuehren
        working-directory: scripts
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ env.RECIPIENT_LIST }}
          PAGES_BASE_URL:     ${{ secrets.PAGES_BASE_URL }}
          UNSUBSCRIBE_URL:    ${{ secrets.UNSUBSCRIBE_URL }}
        run: python3 newsletter.py

      # 6) Aktualisiertes Archiv (data/) committen und in main pushen
      #    Pages liest "main (nur main)" aus der Wurzel -> data/ + index.html
      - name: Archiv committen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Keine Archiv-Aenderungen."
          else
            git commit -m "Archiv aktualisiert: $(date -u +%Y-%m-%d_%H:%M)"
            git push
          fi
