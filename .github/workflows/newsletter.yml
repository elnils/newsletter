name: Tageslage Newsletter

on:
  schedule:
    - cron: "0 6 * * *"
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Abhaengigkeiten installieren
        run: pip install feedparser groq gspread google-auth

      - name: Empfaengerliste laden
        id: recipients
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          python3 - <<'PYEOF'
import os, json

base     = os.environ.get("RECIPIENT_EMAIL", "")
sheet_id = os.environ.get("GOOGLE_SHEET_ID", "")
creds    = os.environ.get("GOOGLE_CREDENTIALS", "")

recipients = [e.strip() for e in base.split(",") if e.strip()]

if sheet_id and creds:
    try:
        import gspread
        from google.oauth2.service_account import Credentials
        info   = json.loads(creds)
        scopes = ["https://www.googleapis.com/auth/spreadsheets.readonly"]
        gc     = gspread.authorize(Credentials.from_service_account_info(info, scopes=scopes))
        sheet  = gc.open_by_key(sheet_id).sheet1
        rows   = sheet.get_all_records()
        for row in rows:
            email  = str(row.get("E-Mail", row.get("email", ""))).strip().lower()
            status = str(row.get("Status", row.get("status", "aktiv"))).strip().lower()
            if email and status in ("aktiv", "active", "ja", "yes", ""):
                if email not in recipients:
                    recipients.append(email)
        print("Sheet geladen: {} aktive Empfaenger gesamt".format(len(recipients)))
    except Exception as e:
        print("Google Sheet nicht erreichbar: {}".format(e))
else:
    print("Kein Sheet konfiguriert - {} Empfaenger aus Secret".format(len(recipients)))

with open(os.environ["GITHUB_ENV"], "a") as f:
    f.write("RECIPIENT_LIST={}\n".format(",".join(recipients)))
PYEOF

      - name: Newsletter ausfuehren
        working-directory: scripts
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ env.RECIPIENT_LIST }}
          PAGES_BASE_URL:     ${{ secrets.PAGES_BASE_URL }}
        run: python newsletter.py

      - name: Archiv-Index generieren
        run: |
          python3 - <<'PYEOF'
import re
from pathlib import Path
from datetime import datetime

archiv_dir = Path("scripts/archiv")
if not archiv_dir.exists():
    print("Kein Archiv-Ordner, ueberspringe")
    exit(0)

files = sorted(archiv_dir.glob("20*.html"), reverse=True)
file_count = len(files)

FONT        = "-apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif"
COLOR_NAVY  = "#1b2a3b"
COLOR_NAVY2 = "#2c3e50"
COLOR_BLUE  = "#5a7fa0"
COLOR_MUTED = "#7a9bb5"
COLOR_LIGHT = "#a0b4c4"
COLOR_BORDER= "#e8e8e8"

rows = ""
for f in files:
    m = re.match(r"(\d{4}-\d{2}-\d{2})-(morgen|abend)", f.stem)
    if not m:
        continue
    date_raw, edition = m.group(1), m.group(2)
    d = datetime.strptime(date_raw, "%Y-%m-%d")
    days   = ["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"]
    months = ["Januar","Februar","Maerz","April","Mai","Juni",
              "Juli","August","September","Oktober","November","Dezember"]
    date_de    = "{}, {}. {} {}".format(days[d.weekday()], d.day, months[d.month-1], d.year)
    edition_de = "Morgen" if edition == "morgen" else "Abend"
    rows += (
        '<tr style="border-bottom:1px solid {};">'.format(COLOR_BORDER) +
        '<td style="padding:11px 16px;font-size:11px;color:{};white-space:nowrap;">{}</td>'.format(COLOR_MUTED, date_de) +
        '<td style="padding:11px 8px;font-size:11px;color:{};">{}</td>'.format(COLOR_MUTED, edition_de) +
        '<td style="padding:11px 16px;">' +
        '<a href="archiv/{}" style="font-family:{};font-size:13px;color:{};text-decoration:none;">'.format(f.name, FONT, COLOR_BLUE) +
        'Tageslage {} - {}-Ausgabe</a>'.format(date_de, edition_de) +
        '</td></tr>\n'
    )

html = (
    '<!DOCTYPE html>\n'
    '<html lang="de">\n'
    '<head>\n'
    '  <meta charset="UTF-8">\n'
    '  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n'
    '  <title>Tageslage - Archiv</title>\n'
    '</head>\n'
    '<body style="margin:0;padding:0;background:#f0f2f4;font-family:' + FONT + ';">\n'
    '<div style="background:' + COLOR_NAVY + ';padding:36px 24px 28px;text-align:center;">\n'
    '  <div style="max-width:720px;margin:0 auto;">\n'
    '    <div style="font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:' + COLOR_MUTED + ';margin-bottom:10px;">Newsletter-Archiv</div>\n'
    '    <div style="font-size:30px;font-weight:700;color:#fff;letter-spacing:-0.5px;margin-bottom:8px;">Tageslage</div>\n'
    '    <div style="font-size:13px;color:' + COLOR_LIGHT + ';">Alle Ausgaben &middot; ' + str(file_count) + ' Eintraege</div>\n'
    '  </div>\n'
    '</div>\n'
    '<div style="background:' + COLOR_NAVY2 + ';padding:8px 24px;text-align:center;font-size:11px;color:' + COLOR_MUTED + ';">\n'
    '  Automatisch aktualisiert &middot; Archiv der letzten 365 Tage\n'
    '</div>\n'
    '<div style="max-width:720px;margin:32px auto;padding:0 16px 40px;">\n'
    '  <table width="100%" cellpadding="0" cellspacing="0" style="background:#fff;border:1px solid ' + COLOR_BORDER + ';border-radius:4px;border-collapse:collapse;">\n'
    '    <thead>\n'
    '      <tr style="border-bottom:2px solid ' + COLOR_NAVY2 + ';">\n'
    '        <th style="padding:12px 16px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:' + COLOR_MUTED + ';font-weight:600;">Datum</th>\n'
    '        <th style="padding:12px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:' + COLOR_MUTED + ';font-weight:600;">Ausgabe</th>\n'
    '        <th style="padding:12px 16px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:' + COLOR_MUTED + ';font-weight:600;">Link</th>\n'
    '      </tr>\n'
    '    </thead>\n'
    '    <tbody>' + rows + '</tbody>\n'
    '  </table>\n'
    '</div>\n'
    '<div style="background:' + COLOR_NAVY + ';padding:20px 24px;text-align:center;">\n'
    '  <p style="font-size:11px;color:' + COLOR_MUTED + ';margin:0;">Powered by Nils &middot; Automatisch erstellt via GitHub Actions</p>\n'
    '</div>\n'
    '</body>\n'
    '</html>'
)

Path("scripts/archiv/index.html").write_text(html, encoding="utf-8")
print("index.html mit {} Eintraegen generiert".format(file_count))
PYEOF

      - name: Archiv auf GitHub Pages deployen
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: scripts/archiv
          destination_dir: archiv
          keep_files: true

      - name: Alte Archivdateien aufraeumen
        run: |
          python3 - <<'PYEOF'
from pathlib import Path
from datetime import datetime, timedelta
import re

cutoff  = datetime.now() - timedelta(days=365)
archiv  = Path("scripts/archiv")
removed = 0
for f in archiv.glob("20*.html"):
    m = re.match(r"(\d{4}-\d{2}-\d{2})", f.stem)
    if m:
        file_date = datetime.strptime(m.group(1), "%Y-%m-%d")
        if file_date < cutoff:
            f.unlink()
            removed += 1
            print("Geloescht: {}".format(f.name))
print("{} alte Dateien entfernt".format(removed))
PYEOF
