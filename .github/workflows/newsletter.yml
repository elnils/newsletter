name: Build Berlin Weekend Guide

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 4 * * 4"   # Donnerstag 06:30 Berlin
  workflow_dispatch:

# Die Action committet die gebauten Dateien zurueck ins Repo (wie beim
# Tageslage-Newsletter). GitHub Pages liefert sie aus main aus.
permissions:
  contents: write

concurrency:
  group: build-weekend-guide
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten (nur fuer optionale Groq-Politur)
        run: pip install -r requirements.txt
        continue-on-error: true

      - name: Events holen + Seite bauen (ins Repo-Wurzelverzeichnis)
        env:
          SITE_URL: https://elnils.github.io/berlin-guide/
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python app.py build   # erst aus Cache bauen (immer etwas da)
          python app.py fetch    # frische Events holen
          python app.py build    # mit frischen Daten neu bauen

      - name: Newsletter verschicken (nur Donnerstag, nur mit Secrets)
        if: github.event_name == 'schedule'
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_LIST: ${{ secrets.RECIPIENT_LIST }}
          UNSUBSCRIBE_URL: ${{ secrets.UNSUBSCRIBE_URL }}
        run: python app.py send
        continue-on-error: true

      - name: Gebaute Seite zurueck ins Repo committen
        run: |
          git config user.name "weekend-guide-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Auto-Update $(date +%d.%m.%Y\ %H:%M)"
          git push
