name: Tageslage Newsletter

on:
  schedule:
    - cron: "30 5 * * *"
    - cron: "30 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Abhaengigkeiten installieren
        run: pip install feedparser groq gspread google-auth

      - name: Empfaengerliste laden
        id: recipients
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          echo "" | base64 -d > /tmp/recipients.py
          python3 /tmp/recipients.py

      - name: Newsletter ausfuehren
        working-directory: scripts
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ env.RECIPIENT_LIST }}
          PAGES_BASE_URL:     ${{ secrets.PAGES_BASE_URL }}
        run: python newsletter.py

      - name: Alte Archivdateien aufraeumen
        run: |
          echo "
