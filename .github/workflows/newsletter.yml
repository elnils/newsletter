name: Tageslage Newsletter

on:
  schedule:
    - cron: "31 5 * * *"
    - cron: "31 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-newsletter:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Abhaengigkeiten installieren
        run: pip install feedparser groq gspread google-auth

      - name: Empfaengerliste laden
        id: recipients
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: python3 scripts/recipients.py

      - name: Newsletter ausfuehren
        working-directory: scripts
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:    ${{ env.RECIPIENT_LIST }}
          PAGES_BASE_URL:     ${{ secrets.PAGES_BASE_URL }}
          UNSUBSCRIBE_URL:    ${{ secrets.UNSUBSCRIBE_URL }}
        run: python3 newsletter.py

      - name: Alte Archivdateien aufraeumen
        run: python3 scripts/cleanup.py

      - name: Archiv-Index generieren
        run: python3 scripts/gen_index.py

      - name: Archiv auf GitHub Pages deployen
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: scripts/archiv
          destination_dir: archiv
          keep_files: true
